<div
  class="overlay"
  [class.overlay--open]="isOpen()"
  role="dialog"
  aria-modal="true"
  aria-label="Navigation menu"
  (keydown)="onKeydown($event)"
>
  <!-- Cyber Grid Background -->
  <div class="overlay__grid" aria-hidden="true"></div>

  <!-- Close Button -->
  <button
    class="overlay__close"
    (click)="onClose()"
    aria-label="Close navigation menu"
    id="overlay-close-btn"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Menu Content -->
  <nav class="overlay__nav" aria-label="Overlay navigation">
    <ul role="list" class="overlay__list">
      @for (item of navItems(); track item.anchor; let i = $index) {
        <li
          class="overlay__item"
          [style.animation-delay]="(i * 0.07) + 's'"
          [class.overlay__item--visible]="isOpen()"
        >
          <button
            class="overlay__link"
            (click)="onNavigate(item.anchor)"
            [id]="'overlay-nav-' + item.anchor"
          >
            <span class="overlay__link-number">0{{ i + 1 }}</span>
            <span class="overlay__link-text">{{ item.label }}</span>
          </button>
        </li>
      }
    </ul>
  </nav>

  <!-- Social Footer -->
  <div class="overlay__footer">
    <a
      href="mailto:kirol01sbusiness@gmail.com"
      class="overlay__social-link"
      aria-label="Email Kirolos Michel"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M22 6l-10 7L2 6" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span>Email</span>
    </a>
    <a
      href="https://linkedin.com/in/kirolos-michel"
      target="_blank"
      rel="noopener noreferrer"
      class="overlay__social-link"
      aria-label="Kirolos Michel on LinkedIn"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
      <span>LinkedIn</span>
    </a>
    <a
      href="https://github.com/KirolosMichel"
      target="_blank"
      rel="noopener noreferrer"
      class="overlay__social-link"
      aria-label="Kirolos Michel on GitHub"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span>GitHub</span>
    </a>
  </div>
</div>
